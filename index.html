<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F7F5F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LENZ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<title>LENZ</title>

<style>
:root {
  --bg: #F7F5F0;
  --bg2: #FFFFFF;
  --bg3: #EFEDE8;
  --navy: #0F1F3D;
  --navy2: #1A3260;
  --navy3: #2B4A8A;
  --up: #0A7B4B;
  --down: #C0392B;
  --up-bg: rgba(10,123,75,0.07);
  --down-bg: rgba(192,57,43,0.07);
  --text: #0F1F3D;
  --text2: #6B7A99;
  --text3: #B0BAD0;
  --border: rgba(15,31,61,0.08);
  --border2: rgba(15,31,61,0.15);
  --accent-light: rgba(26,50,96,0.07);
  --display: 'Syne', sans-serif;
  --sans: 'Noto Sans KR', sans-serif;
  --nav-h: 60px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100dvh; overscroll-behavior: none; }

/* ── TAB PAGES ── */
.page { display: none; max-width: 480px; margin: 0 auto; padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 100px); min-height: 100dvh; }
.page.active { display: block; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-width: 480px; margin: 0 auto;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex; z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -4px 20px rgba(15,31,61,0.06);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 10px 0 8px;
  background: none; border: none; cursor: pointer;
  gap: 3px; transition: all 0.2s;
}
.nav-icon { font-size: 18px; }
.nav-label {
  font-family: var(--display); font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--text3); transition: color 0.2s;
}
.nav-btn.active .nav-label { color: var(--navy); }
.nav-indicator {
  width: 4px; height: 4px; border-radius: 50%;
  background: transparent; transition: background 0.2s;
  margin-top: 2px;
}
.nav-btn.active .nav-indicator { background: var(--navy); }

/* ── HEADER ── */
.page-header {
  background: var(--bg2); padding: 52px 20px 16px;
  border-bottom: 0.5px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 12px rgba(15,31,61,0.04);
}
.header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo { font-family: var(--display); font-size: 26px; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
.logo em { color: var(--navy3); font-style: normal; }
.brand-logo { height: 28px; width: auto; display: block; flex-shrink: 0; max-width: 140px; object-fit: contain; }

/* ── SECTIONS ── */
.section { padding: 16px 20px; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
.section-spacer { height: 8px; background: var(--bg); }
.section-label { font-family: var(--display); font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }

/* ── MARKET CARDS ── */
.market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.market-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 14px; box-shadow: 0 1px 4px rgba(15,31,61,0.05); }
.market-card.up-card { border-color: rgba(10,123,75,0.25); background: var(--up-bg); }
.market-card.down-card { border-color: rgba(192,57,43,0.25); background: var(--down-bg); }
.card-sym { font-family: var(--display); font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: var(--text2); margin-bottom: 4px; }
.card-price { font-family: var(--display); font-size: 15px; font-weight: 700; color: var(--text); }
.card-chg { font-family: var(--display); font-size: 11px; font-weight: 700; margin-top: 3px; }
.up { color: var(--up); } .down { color: var(--down); }
.card-placeholder { font-size: 10px; color: var(--text3); margin-top: 4px; }

  
/* ── PHASE 2: 새 구조 ── */
.period-tabs { display: flex; gap: 6px; padding: 12px 20px; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
.period-tab { flex: 1; padding: 9px 0; text-align: center; background: var(--bg3); color: var(--text2); border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; font-family: var(--sans); }
.period-tab.active { background: var(--navy); color: #fff; }

.search-bar-wrap { padding: 10px 20px; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; gap: 6px; align-items: center; }
.search-input { flex: 1; height: 34px; background: var(--bg3); border: none; border-radius: 8px; padding: 0 12px; font-size: 12px; color: var(--text); font-family: var(--sans); outline: none; }
.search-input::placeholder { color: var(--text3); }
.search-cat-btn { padding: 6px 10px; background: var(--bg3); color: var(--text2); border: none; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: var(--sans); }
.search-cat-btn.active { background: var(--navy); color: #fff; }

.fav-section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.fav-edit-btn { font-size: 11px; color: var(--navy3); background: none; border: none; cursor: pointer; padding: 4px 0; font-family: var(--sans); }
.fav-list { display: flex; flex-direction: column; gap: 6px; }
.fav-card { background: var(--bg); border-radius: 8px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; border: 0.5px solid var(--border); }
.fav-card-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.fav-card-sym { font-size: 13px; font-weight: 500; color: var(--text); }
.fav-card-name { font-size: 10px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.fav-card-right { text-align: right; }
.fav-card-price { font-size: 13px; font-weight: 500; color: var(--text); }
.fav-card-change { font-size: 11px; margin-top: 2px; }
.fav-card-change.up { color: var(--up); }
.fav-card-change.down { color: var(--down); }
.fav-card-change.flat { color: var(--text2); }
.fav-empty { padding: 20px; text-align: center; color: var(--text3); font-size: 12px; }
  
  

/* ── CHECK ITEMS ── */
.check-group { display: flex; flex-direction: column; gap: 6px; }
.check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 10px;
  background: var(--bg); border: 0.5px solid var(--border);
  cursor: pointer; transition: all 0.2s; user-select: none;
}
.check-item.active { background: var(--accent-light); border-color: var(--border2); }
.check-item input { display: none; }
.check-box {
  width: 18px; height: 18px; border-radius: 5px;
  border: 1.5px solid var(--text3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.check-item.active .check-box { background: var(--navy); border-color: var(--navy); }
.check-box::after { content: ''; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: none; }
.check-item.active .check-box::after { display: block; }
.check-info { flex: 1; }
.check-label { font-family: var(--display); font-size: 12px; font-weight: 700; color: var(--text); }
.check-desc { font-size: 10px; color: var(--text2); margin-top: 1px; }
.check-item.active .check-label { color: var(--navy); }

/* ── BRIEF BTN ── */
.brief-section { padding: 14px 20px; background: var(--bg2); }
.brief-btn {
  width: 100%; background: var(--navy); color: #fff; border: none;
  border-radius: 12px; padding: 16px; font-family: var(--display);
  font-size: 14px; font-weight: 800; letter-spacing: 0.08em;
  cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  box-shadow: 0 4px 16px rgba(15,31,61,0.2);
}
.brief-btn:hover { background: var(--navy2); transform: translateY(-1px); }
.brief-btn:active { transform: scale(0.99); }
.brief-btn:disabled { background: var(--bg3); color: var(--text3); box-shadow: none; transform: none; cursor: not-allowed; }

/* ── RESULT ── */
.result-wrap { padding: 20px; background: var(--bg2); margin-top: 8px; }
.result-placeholder { text-align: center; padding: 48px 20px; font-size: 13px; color: var(--text3); line-height: 2; }
.result-placeholder .icon { font-size: 32px; margin-bottom: 12px; display: block; }
.result-text { font-size: 14px; color: var(--text); line-height: 1.9; white-space: pre-wrap; word-break: break-word; }
.loading-wrap { display: flex; flex-direction: column; align-items: center; padding: 48px 20px; gap: 16px; }
.loading-logo { font-family: var(--display); font-size: 18px; font-weight: 800; color: var(--navy); }
.loading-bar { width: 100%; height: 2px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.loading-bar-fill { height: 100%; background: linear-gradient(90deg, transparent, var(--navy2), transparent); animation: sweep 1.5s ease-in-out infinite; }
@keyframes sweep { 0%{transform:translateX(-200%)} 100%{transform:translateX(400%)} }
.loading-msg { font-size: 12px; color: var(--text2); letter-spacing: 0.04em; }

/* ── QUICK + ASK (브리핑 탭 하단) ── */
.brief-bottom {
  position: fixed; bottom: calc(var(--nav-h) + env(safe-area-inset-bottom)); left: 0; right: 0;
  max-width: 480px; margin: 0 auto;
  background: rgba(247,245,240,0.97);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 0.5px solid var(--border);
  box-shadow: 0 -4px 20px rgba(15,31,61,0.04);
  z-index: 100;
}
.quick-btns { display: flex; gap: 6px; padding: 10px 14px 0; overflow-x: auto; scrollbar-width: none; }
.quick-btns::-webkit-scrollbar { display: none; }
.quick-btn {
  flex-shrink: 0; background: var(--bg2); border: 0.5px solid var(--border2);
  border-radius: 20px; padding: 6px 14px;
  font-size: 11px; font-family: var(--display); font-weight: 700;
  color: var(--text2); cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.quick-btn:hover { border-color: var(--navy); color: var(--navy); }
.quick-btn:active { transform: scale(0.96); }
.ask-row { display: flex; gap: 8px; padding: 8px 14px 10px; }
.ask-input {
  flex: 1; background: var(--bg2); border: 0.5px solid var(--border2);
  border-radius: 10px; padding: 11px 14px;
  font-family: var(--sans); font-size: 14px; color: var(--text); outline: none;
}
.ask-input::placeholder { color: var(--text3); }
.ask-send {
  background: var(--navy); border: none; border-radius: 10px;
  padding: 11px 18px; font-family: var(--display); font-size: 12px;
  font-weight: 700; color: #fff; cursor: pointer;
}
.ask-send:hover { background: var(--navy2); }
.timestamp { font-size: 10px; color: var(--text3); text-align: right; padding: 0 14px 6px; }

/* ── SETTINGS ── */
.settings-group { display: flex; flex-direction: column; gap: 6px; }
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; background: var(--bg2);
  border: 0.5px solid var(--border); border-radius: 10px;
}
.settings-row-label { font-size: 13px; font-weight: 500; color: var(--text); }
.settings-row-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.settings-input {
  background: var(--bg); border: 0.5px solid var(--border2);
  border-radius: 6px; padding: 6px 10px;
  font-size: 12px; color: var(--text); outline: none; width: 120px; text-align: right;
}
.tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  display: flex; align-items: center; gap: 4px;
  background: var(--accent-light); border: 0.5px solid var(--border2);
  border-radius: 20px; padding: 5px 12px;
  font-family: var(--display); font-size: 11px; font-weight: 700; color: var(--navy2);
}
.tag-del {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 14px; line-height: 1;
  padding: 0 0 0 4px; transition: color 0.2s;
}
.tag-del:hover { color: var(--down); }
.tag-add-row { display: flex; gap: 8px; margin-top: 8px; }
.tag-add-input {
  flex: 1; background: var(--bg2); border: 0.5px solid var(--border2);
  border-radius: 8px; padding: 8px 12px;
  font-size: 12px; color: var(--text); outline: none;
  text-transform: uppercase;
}
.tag-add-btn {
  background: var(--navy); border: none; border-radius: 8px;
  padding: 8px 16px; font-family: var(--display); font-size: 11px;
  font-weight: 700; color: #fff; cursor: pointer;
}
.save-btn {
  width: 100%; background: var(--navy); color: #fff; border: none;
  border-radius: 12px; padding: 14px; font-family: var(--display);
  font-size: 13px; font-weight: 800; letter-spacing: 0.06em;
  cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  box-shadow: 0 4px 16px rgba(15,31,61,0.2); margin-top: 4px;
}
.save-btn:hover { background: var(--navy2); }
.save-notice { font-size: 11px; color: var(--up); text-align: center; margin-top: 8px; display: none; }

  /* ── EDIT MODAL ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(15,31,61,0.5); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-backdrop.active { display: flex; }
.modal { background: var(--bg2); border-radius: 12px; padding: 20px; width: 100%; max-width: 380px; max-height: 80vh; overflow-y: auto; }
.modal-title { font-family: var(--display); font-size: 16px; font-weight: 800; color: var(--navy); margin-bottom: 14px; }
.modal-close { float: right; background: none; border: none; font-size: 18px; color: var(--text2); cursor: pointer; padding: 0; line-height: 1; }
.modal-fav-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.modal-fav-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--bg); border-radius: 8px; border: 0.5px solid var(--border); }
.modal-fav-info { display: flex; flex-direction: column; gap: 2px; }
.modal-fav-sym { font-size: 13px; font-weight: 500; color: var(--text); }
.modal-fav-name { font-size: 11px; color: var(--text2); }
.modal-fav-del { background: none; border: none; color: var(--down); font-size: 18px; cursor: pointer; padding: 0 6px; }
.modal-add-row { display: flex; gap: 6px; margin-top: 10px; }
.modal-add-input { flex: 1; height: 36px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: 8px; padding: 0 10px; font-size: 12px; color: var(--text); font-family: var(--sans); outline: none; }
.modal-add-btn { background: var(--navy); color: #fff; border: none; border-radius: 8px; padding: 0 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--sans); }
.modal-hint { font-size: 11px; color: var(--text3); margin-top: 8px; }
</style>
</head>
<body>

<!-- ════════════════════════════════
     PAGE 1: 브리핑
════════════════════════════════ -->
<div class="page active" id="page-brief">

  <div class="page-header">
    <div class="header-row">
      <img src="logo_v2.png" alt="WOOARABIN" class="brand-logo">
      <div class="logo">LE<em>N</em>Z</div>
    </div>
    <div class="header-sub">글로벌 시장 실시간 분석 에이전트</div>
  </div>

  <div class="period-tabs">
<button class="period-tab active" data-period="day" onclick="setPeriod('day', this)">당일</button>
<button class="period-tab" data-period="week" onclick="setPeriod('week', this)">주간</button>
<button class="period-tab" data-period="month" onclick="setPeriod('month', this)">월간</button>
  </div>

  <div class="search-bar-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="종목 검색...">
    <button class="search-cat-btn" data-cat="coin" onclick="setSearchCat('coin')">코인</button>
    <button class="search-cat-btn" data-cat="us" onclick="setSearchCat('us')">미국</button>
    <button class="search-cat-btn active" data-cat="kr" onclick="setSearchCat('kr')">한국</button>
  </div>

  <div class="section-spacer"></div>

  <div class="section">
    <div class="fav-section-head">
      <div class="section-label">CRYPTO</div>
      <button class="fav-edit-btn" onclick="editFav('coin')">편집</button>
    </div>
    <div class="fav-list" id="favCoin"></div>
  </div>

  <div class="section">
    <div class="fav-section-head">
      <div class="section-label">US STOCKS</div>
      <button class="fav-edit-btn" onclick="editFav('us')">편집</button>
    </div>
    <div class="fav-list" id="favUS"></div>
  </div>

  <div class="section">
    <div class="fav-section-head">
      <div class="section-label">KR STOCKS</div>
      <button class="fav-edit-btn" onclick="editFav('kr')">편집</button>
    </div>
    <div class="fav-list" id="favKR"></div>
  </div>

  <div class="section-spacer"></div>

  <div class="section-spacer"></div>

  <div class="section" id="resultSection" style="display:none;"></div>
  
  <div class="brief-section">
    <button class="brief-btn" id="briefBtn" onclick="runBriefing()">
      <span id="briefBtnText">브리핑 시작</span>
    </button>
  </div>

</div>

<!-- ════════════════════════════════
     PAGE 2: 설정
════════════════════════════════ -->
<div class="page" id="page-settings">

  <div class="page-header">
    <div class="header-row">
      <div class="page-title">설정</div>
    </div>
    <div class="header-sub">API 키 · 표시 종목 · 기본 설정</div>
  </div>

  <div class="section-spacer"></div>

  <!-- API Key -->
  <div class="section">
    <div class="section-label">Gemini API Key</div>
    <div class="key-wrap" style="background:var(--bg);border-radius:10px;padding:12px;">
      <div class="key-row">
        <input type="password" class="key-input" id="apiKey" placeholder="AIzaSy..." />
        <button class="key-btn" onclick="saveKey()">저장</button>
      </div>
      <div class="key-saved" id="keySaved">✓ 저장됨</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Finnhub API Key <span style="font-size:9px;color:var(--text3);font-family:var(--sans);font-weight:400;">(미국 주식 실시간)</span></div>
    <div class="key-wrap" style="background:var(--bg);border-radius:10px;padding:12px;">
      <div class="key-row">
        <input type="password" class="key-input" id="finnhubKey" placeholder="ct..." />
        <button class="key-btn" onclick="saveFinnhubKey()">저장</button>
      </div>
      <div class="key-saved" id="finnhubSaved">✓ 저장됨</div>
    </div>
  </div>

  <div class="section-spacer"></div>


  
  <!-- 기본 기간 -->
  <div class="section">
    <div class="section-label">기본 뉴스 기간</div>
    <div class="period-tabs">
      <div class="period-tab active" id="def-today" onclick="setDefaultPeriod('today',this)">당일</div>
      <div class="period-tab" id="def-week" onclick="setDefaultPeriod('week',this)">주간</div>
      <div class="period-tab" id="def-month" onclick="setDefaultPeriod('month',this)">월간</div>
    </div>
  </div>

  <div class="section-spacer"></div>

  <!-- 코인 종목 설정 -->
  <div class="section">
    <div class="section-label">표시 코인 종목</div>
    <div class="tag-group" id="coinTags"></div>
    <div class="tag-add-row">
      <input type="text" class="tag-add-input" id="coinAddInput" placeholder="비트코인, BTC, DOGE..." maxlength="20" onkeydown="if(event.key==='Enter')addCoinTag()" />
      <button class="tag-add-btn" onclick="addCoinTag()">추가</button>
    </div>
  </div>

  <!-- 주식 종목 설정 -->
  <div class="section">
    <div class="section-label">표시 주식 종목</div>
    <div class="tag-group" id="stockTags"></div>
    <div class="tag-add-row">
      <input type="text" class="tag-add-input" id="stockAddInput" placeholder="종목 추가 (예: AAPL, MSFT)" maxlength="10" onkeydown="if(event.key==='Enter')addStockTag()" />
      <button class="tag-add-btn" onclick="addStockTag()">추가</button>
    </div>
  </div>

  <div class="section-spacer"></div>

  <!-- 저장 -->
  <div class="section">
    <button class="save-btn" onclick="saveSettings()">설정 저장</button>

<script>
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent';
const DEFAULT_COINS  = ['BTC','ETH','XRP','SOL'];
const DEFAULT_STOCKS = ['TSLA','NVDA','SPY','QQQ'];



/* ── PHASE 2: 즐겨찾기 시스템 ── */

const FAV_KEY = 'lenz_favorites_v2';

const DEFAULT_FAVS = {
  coin: [
    { sym: 'BTC', name: 'Bitcoin' },
    { sym: 'ETH', name: 'Ethereum' },
    { sym: 'SOL', name: 'Solana' },
  ],
  us: [
    { sym: 'TSLA', name: 'Tesla' },
    { sym: 'NVDA', name: 'NVIDIA' },
    { sym: 'QQQ', name: 'Invesco QQQ' },
  ],
  kr: [
    { sym: '005930', name: '삼성전자' },
  ],
};

function loadFavs() {
  try {
    const stored = localStorage.getItem(FAV_KEY);
    if (stored) return JSON.parse(stored);
  } catch (e) {}
  return DEFAULT_FAVS;
}

function saveFavs(favs) {
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
}

function fmtPrice(num, cat) {
  if (num == null || isNaN(num)) return '-';
  if (cat === 'kr') return num.toLocaleString('ko-KR') + '원';
  if (cat === 'coin') {
    if (num >= 1000) return '$' + num.toLocaleString('en-US', { maximumFractionDigits: 0 });
    if (num >= 1) return '$' + num.toFixed(2);
    return '$' + num.toFixed(4);
  }
  return '$' + num.toFixed(2);
}

function fmtChange(rate) {
  const num = Number(rate);
  if (rate == null || isNaN(num)) return { text: '-', cls: 'flat' };
  const sign = num > 0 ? '+' : '';
  const cls = num > 0 ? 'up' : (num < 0 ? 'down' : 'flat');
  return { text: `${sign}${num.toFixed(2)}%`, cls };
}

function renderFavCard(item, cat) {
  const change = fmtChange(item.changeRate);
  const price = fmtPrice(item.price, cat);
  return `
    <div class="fav-card">
      <div class="fav-card-left">
        <div class="fav-card-sym">${item.sym}</div>
        <div class="fav-card-name">${item.name || ''}</div>
      </div>
      <div class="fav-card-right">
        <div class="fav-card-price">${price}</div>
        <div class="fav-card-change ${change.cls}">${change.text}</div>
      </div>
    </div>
  `;
}

function renderFavSection(cat) {
  const favs = loadFavs();
  const list = favs[cat] || [];
  const elId = cat === 'coin' ? 'favCoin' : (cat === 'us' ? 'favUS' : 'favKR');
  const el = document.getElementById(elId);
  if (!el) return;
  if (list.length === 0) {
    el.innerHTML = '<div class="fav-empty">즐겨찾기를 추가하세요</div>';
    return;
  }
  el.innerHTML = list.map(item => renderFavCard(item, cat)).join('');
}

async function fetchKRPrice(code) {
  try {
    const r = await fetch(`/api/naver-stock?code=${code}`);
    if (!r.ok) return null;
    const d = await r.json();
    return { price: d.price, changeRate: d.changeRate, name: d.name };
  } catch (e) { return null; }
}

async function fetchCoinPrice(sym) {
  try {
    const key = localStorage.getItem('finnhub_key');
    if (!key) return null;
    const finnhubSym = COIN_FINNHUB[sym.toUpperCase()];
    if (!finnhubSym) return null;
    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${finnhubSym}&token=${key}`);
    if (!r.ok) return null;
    const d = await r.json();
    if (!d.c || d.c === 0) return null;
    const rate = d.pc ? ((d.c - d.pc) / d.pc) * 100 : 0;
    return { price: d.c, changeRate: rate };
  } catch (e) { return null; }
}

async function fetchUSPrice(sym) {
  try {
    const key = localStorage.getItem('finnhub_key');
    if (!key) return null;
    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${key}`);
    if (!r.ok) return null;
    const d = await r.json();
    if (!d.c) return null;
    return { price: d.c, changeRate: d.dp };
  } catch (e) { return null; }
}

async function loadAllFavPrices() {
  const favs = loadFavs();

  const coinUpdated = await Promise.all(favs.coin.map(async f => {
    const p = await fetchCoinPrice(f.sym);
    return p ? { ...f, ...p } : f;
  }));
  favs.coin = coinUpdated;
  document.getElementById('favCoin').innerHTML = coinUpdated.map(i => renderFavCard(i, 'coin')).join('') || '<div class="fav-empty">즐겨찾기를 추가하세요</div>';

  const usUpdated = await Promise.all(favs.us.map(async f => {
    const p = await fetchUSPrice(f.sym);
    return p ? { ...f, ...p } : f;
  }));
  favs.us = usUpdated;
  document.getElementById('favUS').innerHTML = usUpdated.map(i => renderFavCard(i, 'us')).join('') || '<div class="fav-empty">즐겨찾기를 추가하세요</div>';

  const krUpdated = await Promise.all(favs.kr.map(async f => {
    const p = await fetchKRPrice(f.sym);
    return p ? { ...f, ...p, name: p.name || f.name } : f;
  }));
  favs.kr = krUpdated;
  document.getElementById('favKR').innerHTML = krUpdated.map(i => renderFavCard(i, 'kr')).join('') || '<div class="fav-empty">즐겨찾기를 추가하세요</div>';
}

/* ── PHASE 2: 검색 카테고리 + 편집 ── */
let currentSearchCat = 'kr';

function setSearchCat(c) {

let editingCat = null;

function editFav(cat) {
  editingCat = cat;
  const titles = { coin: '코인 즐겨찾기 편집', us: '미국 주식 즐겨찾기 편집', kr: '한국 주식 즐겨찾기 편집' };
  const hints = {
    coin: '예: BTC, ETH, SOL, DOGE (영문 심볼)',
    us: '예: TSLA, NVDA, AAPL (영문 티커)',
    kr: '예: 005930 (6자리 종목코드)',
  };
  const placeholders = {
    coin: '코인 심볼 입력 (BTC, ETH...)',
    us: '미국 종목 티커 입력 (TSLA...)',

  };

  document.getElementById('editModalTitle').textContent = titles[cat];
  document.getElementById('editModalHint').textContent = hints[cat];
  document.getElementById('editModalInput').placeholder = placeholders[cat];
  document.getElementById('editModalInput').value = '';

  renderEditModalList();
  document.getElementById('editModal').classList.add('active');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
  editingCat = null;
  loadAllFavPrices();
}

function renderEditModalList() {
  const favs = loadFavs();
  const list = favs[editingCat] || [];
  const el = document.getElementById('editModalList');
  if (list.length === 0) {
    el.innerHTML = '<div class="fav-empty" style="padding:10px;">즐겨찾기 없음</div>';
    return;
  }
  el.innerHTML = list.map((item, idx) => `
    <div class="modal-fav-item">
      <div class="modal-fav-info">
        <div class="modal-fav-sym">${item.sym}</div>
        <div class="modal-fav-name">${item.name || ''}</div>
      </div>
      <button class="modal-fav-del" onclick="removeFavItem(${idx})">×</button>
    </div>
  `).join('');
}

async function addFavItem() {
  const input = document.getElementById('editModalInput');
  const raw = input.value.trim();
  if (!raw) return;

  const favs = loadFavs();
  const list = favs[editingCat] || [];

  let newItem = null;

  if (editingCat === 'coin') {
    const sym = resolveCoinInput(raw);
    if (!sym) { alert('인식할 수 없는 코인입니다.'); return; }
    if (list.some(f => f.sym === sym)) { alert('이미 등록된 코인입니다.'); return; }
    newItem = { sym, name: sym };
  } else if (editingCat === 'us') {
    const sym = raw.toUpperCase();
    if (sym.length < 1 || sym.length > 10) { alert('유효한 티커를 입력하세요.'); return; }
    if (list.some(f => f.sym === sym)) { alert('이미 등록된 종목입니다.'); return; }
    newItem = { sym, name: sym };
  } else if (editingCat === 'kr') {
    if (!/^\d{6}$/.test(raw)) { alert('6자리 종목코드를 입력하세요.'); return; }
    if (list.some(f => f.sym === raw)) { alert('이미 등록된 종목입니다.'); return; }
    // 종목명 자동 조회
    try {
      const r = await fetch(`/api/naver-stock?code=${raw}`);
      if (r.ok) {
        const d = await r.json();
        newItem = { sym: raw, name: d.name || raw };
      } else {
        newItem = { sym: raw, name: raw };
      }
    } catch (e) {
      newItem = { sym: raw, name: raw };
    }
  }

  if (!newItem) return;

  list.push(newItem);
  favs[editingCat] = list;
  saveFavs(favs);
  input.value = '';
  renderEditModalList();
  renderFavSection(editingCat);
}

function removeFavItem(idx) {
  const favs = loadFavs();
  favs[editingCat].splice(idx, 1);
  saveFavs(favs);
  renderEditModalList();
  renderFavSection(editingCat);
}
  
const COIN_FINNHUB = {
  BTC:'BINANCE:BTCUSDT', ETH:'BINANCE:ETHUSDT', XRP:'BINANCE:XRPUSDT',
  SOL:'BINANCE:SOLUSDT', DOGE:'BINANCE:DOGEUSDT', ADA:'BINANCE:ADAUSDT',

  '카르다노':'ADA', '아발란체':'AVAX', '폴카닷':'DOT', '체인링크':'LINK',
  '시바이누':'SHIB', '시바':'SHIB', '유니스왑':'UNI', '코스모스':'ATOM',
  '라이트코인':'LTC', '비트코인캐시':'BCH', '니어':'NEAR', '앱토스':'APT',
  '아비트럼':'ARB', '옵티미즘':'OP', '톤':'TON'
};

let currentPeriod = 'today';
let userCoins  = [...DEFAULT_COINS];
let userStocks = [...DEFAULT_STOCKS];
let coinPriceText  = '';
let stockPriceText = '';
let refreshTimer   = null;

function resolveCoinInput(raw) {
  const trimmed = raw.trim();
  const upper = trimmed.toUpperCase();
  if (COIN_KR[trimmed]) return COIN_KR[trimmed];
  if (COIN_FINNHUB[upper]) return upper;
  if (upper.length >= 2 && upper.length <= 10) return upper;
  return null;
}

function addCoinTag() {

function addStockTag() {

}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── GEMINI CALL ── */
async function callGemini(prompt, maxTokens = 3000) {
  const key = getKey();
  if (!key) { setResult('API 키를 설정 탭에서 입력해주세요.'); return null; }
  const r = await fetch(`${GEMINI_URL}?key=${key}`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      tools: [{ googleSearch: {} }],
      generationConfig: { temperature: 0.7, maxOutputTokens: maxTokens }
    })
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${r.status}`);
  }
  const data = await r.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '응답 없음';
}

/* ── BRIEFING (Phase 2) ── */

function getPeriodLabel(p) {
  if (p === 'week') return '최근 7일';
  if (p === 'month') return '최근 30일';
  return '오늘';
}

function buildFavList(favs) {
  return favs.map(f => {
    const price = f.price != null ? fmtPrice(f.price, f._cat) : '데이터 없음';
    const rateNum = Number(f.changeRate);
    const rate = (f.changeRate != null && !isNaN(rateNum)) ? `${rateNum >= 0 ? '+' : ''}${rateNum.toFixed(2)}%` : '';
    return `- ${f.sym} (${f.name || ''}): ${price} ${rate}`;
  }).join('\n');
}

async function runBriefing() {
  const btn = document.getElementById('briefBtn');
  btn.disabled = true;
  document.getElementById('briefBtnText').textContent = '분석 중...';
  setLoading('실시간 가격 갱신 중...');

  // 최신 가격 다시 로드
  await loadAllFavPrices();

  const favs = loadFavs();
  favs.coin.forEach(f => f._cat = 'coin');
  favs.us.forEach(f => f._cat = 'us');
  favs.kr.forEach(f => f._cat = 'kr');

  const period = currentPeriod;
  const periodLabel = getPeriodLabel(period);
  const today = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });

  setLoading('시장 분석 중...');

  try {
    // 코인 + 미국 동시 호출
    const [coinBrief, usBrief, krBrief] = await Promise.all([
      favs.coin.length > 0 ? briefCoinUS(favs.coin, 'coin', periodLabel, today) : Promise.resolve(''),
      favs.us.length > 0 ? briefCoinUS(favs.us, 'us', periodLabel, today) : Promise.resolve(''),
      favs.kr.length > 0 ? briefKR(favs.kr, periodLabel, today) : Promise.resolve(''),
    ]);

    const result = [

      usBrief && '━━━━━━━━━━━━━━━━━━━━━\n📈 미국 증시\n' + usBrief,
      krBrief && '━━━━━━━━━━━━━━━━━━━━━\n🇰🇷 한국 증시\n' + krBrief,
      '',

}

[데이터 소스]
실시간 구글 검색으로 ${sourceHint} 동향 반드시 포함.

[현재 가격]
${list}

[톤]
- 보고체 ("~합니다", "~입니다")
- 추측 표현 금지 ("~로 보입니다" X)

  return await callGemini(prompt, 1500);

async function briefKR(favs, periodLabel, today) {
  // 1단계: 네이버 뉴스 수집
  const newsBlocks = [];

  for (const fav of favs) {
    try {
      const r = await fetch(`/api/naver-search?query=${encodeURIComponent(fav.name || fav.sym)}&type=news&display=5&sort=date`);
      if (!r.ok) continue;
      const data = await r.json();
      const items = (data.items || []).map(it => {
        const title = (it.title || '').replace(/<\/?b>/g, '').replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&apos;/g, "'");
        const desc = (it.description || '').replace(/<\/?b>/g, '').replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&apos;/g, "'");
        const date = it.pubDate || '';
        return `- [${date}] ${title} :: ${desc}`;
      }).join('\n');
      newsBlocks.push(`▼ ${fav.sym} (${fav.name})\n${items || '뉴스 없음'}`);
    } catch (e) {
      newsBlocks.push(`▼ ${fav.sym} (${fav.name})\n뉴스 수집 실패`);
    }
  }

  const list = buildFavList(favs);
  const newsText = newsBlocks.join('\n\n');

  // 2단계: Gemini 요약
  const prompt = `오늘은 ${today}입니다. ${periodLabel} 기준 한국 주식 시장 브리핑을 작성합니다.

[현재 가격]
${list}

[수집된 네이버 뉴스]
${newsText}

[형식 — 반드시 준수]
- 종목별 분석 (각 1줄, 가격/등락률은 위 데이터 인용, 핵심 이슈는 뉴스 기반)
- 마지막에 "⭐ 오늘의 주목 종목: [종목명] — [선정 근거 2문장. 뉴스 기반.]"

[톤]
- 보고체 ("~합니다", "~입니다")
- 추측 표현 금지
- 감정/과장 금지
- 자기소개 금지
- 핵심만 간결하게
- ${periodLabel} 관련 뉴스 없으면 "관련 뉴스 없음"으로 명시
- 뉴스 출처는 "네이버 뉴스 기준" 으로만 표기, 개별 언론사명 나열 금지`;

  return await callGemini(prompt, 1500);
}

/* ── QUICK / ASK ── */
function quickAsk(q) {
  document.getElementById('askInput').value = q;
  askQuestion();
}
async function askQuestion() {
  const input = document.getElementById('askInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  setLoading('분석 중...');
  const prompt = `당신은 월가와 여의도에서 20년 이상 활동한 수석 시장 애널리스트입니다.

질문: ${q}

실시간 구글 검색으로 최신 정보를 찾아 아래 원칙에 따라 답변하세요:

1. 데이터와 수치 기반의 냉철한 분석
2. X(트위터) site:x.com 및 Reddit 커뮤니티 시장 동향 포함
3. 전문적이고 임팩트 있는 표현, 모든 문장 완성된 형태로
4. 마지막에 애널리스트로서의 시장 관점 1문장 (직접 매수 권유 아닌 분석적 의견)
5. 최종 줄: "⚠️ 본 의견은 LENZ 애널리스트의 분석적 관점이며, 투자 결과의 책임은 투자자 본인에게 있습니다."`;
  try {
    const result = await callGemini(prompt, 2000);
    if (result) setResult(result);
  } catch(e) {
    setResult(`오류: ${e.message}`);
  }
}
